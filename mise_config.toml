[tasks.route-files]
description = "Route any files to project folders based on config"
run = """
#!/bin/bash
set -euo pipefail

source_path="${1:?source_path is required}"
config_path='/Users/mull/Library/CloudStorage/GoogleDrive-maruyama@sigmailab.com/My Drive/project-routes.yaml'
