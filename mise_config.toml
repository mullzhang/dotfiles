[tools]
node = "latest"
python = "latest"
uv = "latest"

[tasks.ccn]
description = "Output complexity CSV rows filtered by threshold argument"
run = "bash ~/dotfiles/scripts/ccn.sh"
raw_args = true
quiet = true

[tasks.op-json]
description = "Import JSON file into 1Password"
run = "bash ~/dotfiles/scripts/import_json_to_1password.sh"
raw_args = true

[tasks.loglevel-stats]
description = "Get log level stats from log files"
run = "python ~/dotfiles/scripts/log_level_stats.py"
raw_args = true

[tasks.specstory-clean]
description = "Clean SpecStory markdown exports"
run = "python ~/dotfiles/scripts/specstory_clean.py"
raw_args = true

[tasks.osrm-bg]
description = "Run OSRM container in background"
run = """
#!/usr/bin/env bash
set -euo pipefail

osrm_script_dir="${OSRM_SCRIPT_DIR:-$HOME/dotfiles/scripts/osrm}"
area="${OSRM_AREA:-kanto}"
osrm_file="$osrm_script_dir/.data/$area/$area-latest.osrm"

if [[ ! -f "$osrm_file" ]]; then
  echo "OSRM data not found: $osrm_file" >&2
  echo "Run 'mise run osrm-setup' first." >&2
  exit 1
fi

make -C "$osrm_script_dir" background
"""

[tasks.osrm-run]
description = "Run OSRM container in foreground"
run = "make -C ~/dotfiles/scripts/osrm run"

[tasks.osrm-setup]
description = "Download and prepare OSRM data"
run = "make -C ~/dotfiles/scripts/osrm setup"

[tasks.plotly-agg]
description = "Aggregate Plotly HTML files into a single HTML file"
run = "python ~/dotfiles/scripts/plotly_aggregator.py"
raw_args = true

[tasks.brew-apply]
description = "Apply Homebrew snapshot from homebrew/Brewfile"
run = "brew bundle --no-upgrade --file ~/dotfiles/homebrew/Brewfile"

[tasks.brew-check]
description = "Check whether Homebrew snapshot is satisfied"
run = "brew bundle check --no-upgrade --file ~/dotfiles/homebrew/Brewfile"

[tasks.brew-dump]
description = "Update homebrew/Brewfile with Homebrew formulae and casks only"
run = "brew bundle dump --formula --cask --file ~/dotfiles/homebrew/Brewfile --force"

[tasks.brew-cleanup]
description = "Uninstall Homebrew formulae and casks not in homebrew/Brewfile"
run = "brew bundle cleanup --formula --cask --file ~/dotfiles/homebrew/Brewfile --force"

[tasks.apm-install-local]
description = "Install an APM dependency into local APM config"
run = "bash ~/dotfiles/scripts/apm_install.sh local install"
raw_args = true

[tasks.apm-install-shared]
description = "Install an APM dependency into shared APM config"
run = "bash ~/dotfiles/scripts/apm_install.sh shared install"
raw_args = true

[tasks.apm-uninstall-local]
description = "Uninstall an APM dependency from local APM config"
run = "bash ~/dotfiles/scripts/apm_install.sh local uninstall"
raw_args = true

[tasks.apm-uninstall-shared]
description = "Uninstall an APM dependency from shared APM config"
run = "bash ~/dotfiles/scripts/apm_install.sh shared uninstall"
raw_args = true

[tasks.apm-update-local]
description = "Update local APM dependencies and deploy agent skills"
run = "bash ~/dotfiles/scripts/apm_install.sh local update"

[tasks.apm-update-shared]
description = "Update shared APM dependencies and deploy agent skills"
run = "bash ~/dotfiles/scripts/apm_install.sh shared update"

[tasks.route-files]
description = "Route any files to project folders based on config"
run = """
#!/usr/bin/env bash
set -euo pipefail

source_path="${1:?source_path is required}"
config_path="${PROJECT_ROUTES_CONFIG:-$HOME/Library/CloudStorage/GoogleDrive-maruyama@sigmailab.com/My Drive/project-routes.yaml}"

prompt="route-project-files スキルを用いて、設定ファイル${config_path}に従って、${source_path}(フォルダの場合は配下のファイル)を各プロジェクトのフォルダに移動してください。"
exec codex -c 'model_reasoning_effort="low"' "$prompt"
"""
raw_args = true

[tasks.route-gmeet-files]
description = "Route Google Meet files to project folders based on config"
run = """
#!/usr/bin/env bash
set -euo pipefail

source_dir="${GMEET_RECORDINGS_DIR:-$HOME/Library/CloudStorage/GoogleDrive-maruyama@sigmailab.com/My Drive/Meet Recordings}"
config_path="${PROJECT_ROUTES_CONFIG:-$HOME/Library/CloudStorage/GoogleDrive-maruyama@sigmailab.com/My Drive/project-routes.yaml}"

prompt="route-project-files スキルを用いて、設定ファイル${config_path}に従って、${source_dir}配下のファイルを各プロジェクトのフォルダに移動してください。"
exec codex -c 'model_reasoning_effort="low"' "$prompt"
"""
raw_args = true
